version: '3'
services:
  db:
    image: mariadb
    restart: always
    environment:
      - MYSQL_DATABASE=blog_data
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_USER=django1
      - MYSQL_PASSWORD=password1
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - myapp_network
  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - '8000:8000'
    depends_on:
      - db
    environment:
      - DATABASE_HOST=db
    networks:
      - myapp_network

  web:
    image: nginx:alpine
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - db
    networks:
      - myapp_network 

volumes:
  db_data:

networks:
  myapp_network:
    driver: bridge  