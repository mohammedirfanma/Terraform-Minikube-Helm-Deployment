apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: web-tier
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000  # More standard UID
        fsGroup: 1000       
      initContainers:               # <-- add here
        - name: wait-for-db
          image: busybox
          command:
            - sh
            - -c
            - |
              until nc -z db.data-tier.svc.cluster.local 3306; do
                echo "Waiting for DB..."
                sleep 2
              done
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          resources:
            requests:
              memory: "256Mi"   # Minimum RAM needed to start
              cpu: "100m"       # 1/10th of a CPU core
            limits:
              memory: "512Mi"   # Max RAM allowed (Prevents OOM)
              cpu: "500m"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args: ["python manage.py migrate && gunicorn myapp.wsgi:application --bind 0.0.0.0:8000"]
          env:
            - name: USER
              value: "django"
            - name: PYTHONPATH
              value: /app/myapp
            - name: DJANGO_SETTINGS_MODULE
              value: settings
            - name: DB_HOST
              value: db.data-tier.svc.cluster.local
            - name: DB_NAME
              value: blog_data
            - name: DB_USER
              value: django1
            - name: DB_PASSWORD
              value: {{ .Values.secrets.djangopassword }}
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
          ports:
            - containerPort: 8000
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 8000
          #   initialDelaySeconds: 10
          #   periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: web-tier
spec:
  selector:
    app: backend
  ports:
    - port: 8000
  type: ClusterIP