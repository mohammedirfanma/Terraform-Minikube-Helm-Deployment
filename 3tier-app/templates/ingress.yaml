apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: web-tier
spec:
  ingressClassName: cilium # Updated to use the eBPF datapath
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 80
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: web-tier
spec:
  endpointSelector:
    matchLabels:
      app: web # Ensure this matches your frontend pod's label
  ingress:
  - fromEndpoints:
    - matchLabels:
        "k8s:io.kubernetes.pod.namespace": kube-system
        "k8s:app.kubernetes.io/name": cilium-envoy