apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myapp-ingress
  namespace: web-tier
  annotations:
    # This explicit annotation forces Cilium's legacy engine to reconcile the resource
    cilium.io/ingress.class: "cilium"
spec:
  ingressClassName: cilium
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 80