apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: cilium
spec:
  controller: cilium.io/ingress-controller
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: default-deny-all
  namespace: web-tier
spec:
  description: "Zero-Trust: Deny all ingress and egress traffic by default"
  endpointSelector: {} # Matches ALL pods in web-tier
  ingress:
    - {}
  egress:
    - {}
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: web-tier
spec:
  description: "Allow all pods in the namespace to query cluster CoreDNS"
  endpointSelector: {} 
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: frontend-rules
  namespace: web-tier
spec:
  description: "Frontend isolation rules"
  endpointSelector:
    matchLabels:
      app: web
  ingress:
    # Allow traffic from host machine browser via NodePort
    - fromEntities:
        - world 
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
  egress:
    # Allow frontend to send outgoing requests strictly to the backend pod on port 8000
    - toEndpoints:
        - matchLabels:
            app: backend
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: backend-rules
  namespace: web-tier
spec:
  description: "Backend isolation rules"
  endpointSelector:
    matchLabels:
      app: backend
  ingress:
    # Only accept traffic coming from frontend
    - fromEndpoints:
        - matchLabels:
            app: web
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # Cross the namespace boundary to allow backend to talk to MariaDB in data-tier
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": data-tier
            app: mariadb
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: database-rules
  namespace: data-tier # CORRECTED: Must be deployed in the same namespace as the DB
spec:
  description: "Database isolation rules"
  endpointSelector:
    matchLabels:
      app: mariadb
  ingress:
    # Cross the namespace boundary to accept traffic from the backend in web-tier
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": web-tier
            app: backend
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP