---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: web-tier
spec:
  type: NodePort
  selector:
    app: web # Matches your frontend deployment pods
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 32080